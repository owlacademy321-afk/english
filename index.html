<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Challenge 📚</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #7c3aed;
      --primary-fg: #fff;
      --accent: #10b981;
      --accent-fg: #fff;
      --secondary: #f59e0b;
      --secondary-fg: #1c1917;
      --destructive: #ef4444;
      --destructive-fg: #fff;
      --bg: #f3effb;
      --fg: #2d1f4a;
      --card: #fff;
      --muted: #e5dff7;
      --muted-fg: #6b5e8a;
      --border: #d4c9ef;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    .fredoka { font-family: 'Fredoka', sans-serif; }
    .nunito  { font-family: 'Nunito', sans-serif; }

    /* ── Layout ── */
    .screen { display: none; min-height: 100vh; position: relative; overflow: hidden; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(124,58,237,.12);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Fredoka', sans-serif; font-size: 1.1rem; font-weight: 700;
      padding: 12px 28px; border-radius: 9999px; border: none; cursor: pointer;
      transition: opacity .15s, transform .1s; box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .btn:hover { opacity: .9; transform: scale(1.03); }
    .btn:active { transform: scale(.96); }
    .btn-primary { background: var(--primary); color: var(--primary-fg); }
    .btn-muted    { background: var(--muted);   color: var(--muted-fg); box-shadow: none; }
    .btn-sm { font-size: .95rem; padding: 10px 20px; }

    /* ── Difficulty cards ── */
    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 12px 0 24px; }
    .diff-card {
      border: 2px solid var(--border); border-radius: 18px; padding: 14px 8px;
      text-align: center; cursor: pointer; background: rgba(255,255,255,.7);
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .diff-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .diff-card.selected { border-color: var(--primary); background: rgba(124,58,237,.07); box-shadow: 0 4px 18px rgba(124,58,237,.18); transform: scale(1.04); }
    .diff-card .emoji { font-size: 2rem; display: block; margin-bottom: 4px; }
    .diff-card .dlabel { font-family:'Fredoka',sans-serif; font-size:.95rem; font-weight:700; }
    .diff-card .ddesc  { font-size:.7rem; color:var(--muted-fg); margin-top:4px; }
    .diff-card .dmeta  { font-size:.65rem; color:var(--muted-fg); margin-top:6px; }

    /* ── Progress bar ── */
    .prog-wrap { width:100%; margin-bottom: 16px; }
    .prog-labels { display:flex; justify-content:space-between; font-size:.8rem; font-family:'Fredoka',sans-serif; color:var(--muted-fg); margin-bottom:6px; }
    .prog-track { height:14px; background:var(--muted); border-radius:9999px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,.08); }
    .prog-fill  { height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:9999px; transition:width .5s ease; }

    /* ── Timer ── */
    .timer-wrap { display:flex; align-items:center; gap:10px; }
    .timer-icon { font-size:1.3rem; }
    .timer-track { width:120px; height:12px; background:var(--muted); border-radius:9999px; overflow:hidden; }
    .timer-fill  { height:100%; border-radius:9999px; transition:width 1s linear; background: var(--primary); }
    .timer-fill.low { background: var(--destructive); }
    .timer-text { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:700; min-width:3ch; text-align:right; }
    .timer-text.low { color: var(--destructive); }
    @keyframes wiggle { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    .wiggle { animation: wiggle .6s ease-in-out infinite; }

    /* ── Score ── */
    .score-wrap { display:flex; align-items:center; gap:6px; background:rgba(245,158,11,.18); padding:8px 16px; border-radius:9999px; }
    .score-text { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:700; }

    /* ── Game header ── */
    .game-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; width:100%; max-width:480px; }

    /* ── Question types ── */
    .q-type-label { display:flex; align-items:center; gap:6px; justify-content:center; margin-bottom:12px; font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    .q-type-label.scramble { color: var(--primary); }
    .q-type-label.fillblank { color: var(--accent); }

    /* Scramble tiles */
    .tiles { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; padding:12px 0; }
    .tile { width:52px; height:52px; background:var(--primary); color:var(--primary-fg); border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-size:1.5rem; font-weight:700; box-shadow:0 4px 12px rgba(124,58,237,.3); }

    /* Input row */
    .input-row { display:flex; gap:10px; max-width:300px; margin:0 auto; }
    .input-row input {
      flex:1; padding:10px 14px; border-radius:12px; border:2px solid var(--border); font-family:'Nunito',sans-serif; font-size:1rem; text-align:center; text-transform:uppercase; outline:none; background:var(--bg);
    }
    .input-row input:focus { border-color:var(--primary); }
    .btn-go { background:var(--accent); color:var(--accent-fg); border-radius:12px; border:none; padding:10px 18px; font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
    .btn-go:hover { opacity:.85; }
    .btn-go:disabled { opacity:.4; cursor:default; }

    /* Fill blank sentence */
    .sentence { font-family:'Fredoka',sans-serif; font-size:1.6rem; font-weight:700; text-align:center; line-height:1.6; }
    .blank { display:inline-block; white-space:nowrap; }
    .blank-inner { display:inline-block; padding:0 16px 2px; border-bottom:4px solid var(--primary); color:var(--primary); vertical-align:bottom; font-family:'Fredoka',sans-serif; font-size:1.6rem; }
    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:340px; margin:20px auto 0; }
    .opt-btn {
      font-family:'Fredoka',sans-serif; font-size:1.05rem; font-weight:700;
      padding:14px 10px; border-radius:14px; border:none; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.12); transition:opacity .15s, transform .1s;
    }
    .opt-btn:hover:not(:disabled) { opacity:.88; transform:scale(1.03); }
    .opt-btn:active { transform:scale(.96); }
    .opt-btn:disabled { opacity:.45; cursor:default; }
    .opt-c0 { background:var(--primary); color:var(--primary-fg); }
    .opt-c1 { background:var(--accent); color:var(--accent-fg); }
    .opt-c2 { background:var(--secondary); color:var(--secondary-fg); }
    .opt-c3 { background:var(--destructive); color:var(--destructive-fg); }
